});
// Right-click: rotate ghost 90° in build mode, otherwise suppress context menu
document.addEventListener('contextmenu', e => {
  if (buildMode && state.phase === 'playing' && !settingsOpen) {
    e.preventDefault();
    buildRot = (buildRot + 1) % 4;
  } else {
    e.preventDefault();
  }
});

function startGame(endless) {
  state.endless   = endless;
  state.phase     = 'playing';
  state.kills     = 0;
  state.livesMode = false;
  state.lives     = 3;

  if (endless) {
    state.endlessLevel++;
  }

  // Reset building / loot state from previous round
  for (const pp of placedPieces) {
    scene.remove(pp.mesh);
    pp.envObjs.forEach(o => {
      const idx = envObjects.indexOf(o);
      if (idx !== -1) envObjects.splice(idx, 1);
    });
  }
  placedPieces.length = 0;
  for (const ww of worldWeapons) scene.remove(ww.mesh);
  worldWeapons.length = 0;
  buildMode = false;
  if (ghostMesh) ghostMesh.visible = false;
  cancelEdit();

  // Reset player
  player.hp          = 100;
  player.velY        = 0;
  player.onGround    = false;
  player.weapon      = 'pistol';
  player.inventory   = { pistol: { ...WEAPONS.pistol } };
  player.fireCooldown= 0;

  // Spawn player in center
  camera.position.set(0, PLAYER_HEIGHT, 0);
  player.yaw   = 0;
  player.pitch = 0;
  camera.rotation.order = 'YXZ';

  // Reset chests
  chests.forEach(c => {
    c.open = false;
    c.mesh.children[1].rotation.x = 0;
    if (c.light) { c.light.color.set(0xf0c040); c.light.intensity = 1.5; }
  });

  // Hide overlay, request pointer lock
  document.getElementById('overlay').style.display = 'none';
  canvas.requestPointerLock();

  spawnBots();
  initStorm();
  // Pre-compile all shaders so first-render stutter doesn't happen mid-game
  renderer.compile(scene, camera);
}

const bots = [];

function createBotMesh(outfitColor) {
  const group = new THREE.Group();

  // Materials — baseColor stored for hit-flash restore
  function mat(color, roughness, metalness) {
    const m = new THREE.MeshStandardMaterial({ color, roughness, metalness });
    m.userData.baseColor = color instanceof THREE.Color ? color.getHex() : color;
    return m;
  }
  const outfitMat  = mat(outfitColor, 0.80, 0.10);
  const skinMat    = mat(0xffdead,    0.85, 0.00);
  const bootMat    = mat(0x1a1a1a,    0.90, 0.15);
  const helmetMat  = mat(0x1a1a2e,    0.55, 0.35);
  const vestMat    = mat(0x2a3040,    0.70, 0.20);
  const padMat     = mat(0x1c1c28,    0.75, 0.15);
  const visorMat   = new THREE.MeshStandardMaterial({ color: 0x0088dd, roughness: 0.05, metalness: 0.90, emissive: 0x002266, emissiveIntensity: 0.6 });
  visorMat.userData.baseColor = 0x0088dd;
  const eyeMat     = new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0xff2200, emissiveIntensity: 2.0 });
  eyeMat.userData.baseColor = 0xff3300;

  // Helper: create a mesh, position it, enable shadow
  function mk(geo, material, px, py, pz) {
    const m = new THREE.Mesh(geo, material.clone());
    m.material.userData.baseColor = material.userData.baseColor;
    m.position.set(px, py, pz);
    m.castShadow = true;
    return m;
  }

  // ── Static torso parts ──────────────────────────────────────────
  const hips   = mk(new THREE.BoxGeometry(0.38, 0.22, 0.25), outfitMat, 0, 0.91, 0);
  const torso  = mk(new THREE.BoxGeometry(0.55, 0.55, 0.28), outfitMat, 0, 1.30, 0);
  const neck   = mk(new THREE.CylinderGeometry(0.08, 0.10, 0.14, 8), skinMat, 0, 1.65, 0);
  // Tactical vest
  const vest   = mk(new THREE.BoxGeometry(0.50, 0.44, 0.08), vestMat,   0, 1.30, 0.19);
  const pouchL = mk(new THREE.BoxGeometry(0.12, 0.10, 0.06), padMat, -0.14, 1.38, 0.24);
  const pouchR = mk(new THREE.BoxGeometry(0.12, 0.10, 0.06), padMat,  0.14, 1.38, 0.24);
  // Belt
  const belt   = mk(new THREE.BoxGeometry(0.40, 0.06, 0.27), padMat, 0, 0.82, 0);
  group.add(hips, torso, neck, vest, pouchL, pouchR, belt);

  // ── Head pivot (rotates Y for head-turn) ────────────────────────
  const headPivot = new THREE.Group();
  headPivot.position.set(0, 1.90, 0);
  const head    = mk(new THREE.BoxGeometry(0.36, 0.36, 0.36), skinMat,   0, 0,    0);
  // Helmet shell covers top/sides of head
  const helmet  = mk(new THREE.BoxGeometry(0.42, 0.22, 0.42), helmetMat, 0, 0.18, 0);
  // Visor strip (front only)
  const visor   = mk(new THREE.BoxGeometry(0.37, 0.08, 0.04), visorMat,  0, 0.05, 0.22);
  // Glowing eye dots
  const eyeL    = mk(new THREE.BoxGeometry(0.05, 0.04, 0.02), eyeMat, -0.08, 0.03, 0.20);
  const eyeR    = mk(new THREE.BoxGeometry(0.05, 0.04, 0.02), eyeMat,  0.08, 0.03, 0.20);
  headPivot.add(head, helmet, visor, eyeL, eyeR);
  group.add(headPivot);

  // ── Arms ────────────────────────────────────────────────────────
  function makeArm(side) {
    const pivot = new THREE.Group();
    pivot.position.set(side * 0.37, 1.52, 0);
    const upper = mk(new THREE.CylinderGeometry(0.09, 0.09, 0.35, 8), outfitMat, 0, -0.175, 0);
    // Shoulder pad
    const sPad  = mk(new THREE.BoxGeometry(0.19, 0.10, 0.22), padMat, 0, -0.02, 0);
    pivot.add(upper, sPad);
    const forearmPivot = new THREE.Group();
    forearmPivot.position.set(0, -0.35, 0);
    const fore  = mk(new THREE.CylinderGeometry(0.075, 0.075, 0.30, 8), skinMat, 0, -0.15, 0);
    forearmPivot.add(fore);
    pivot.add(forearmPivot);
    return { pivot, forearmPivot };
  }
  const leftArm  = makeArm(-1);
  const rightArm = makeArm( 1);
  group.add(leftArm.pivot, rightArm.pivot);

  // ── Legs ────────────────────────────────────────────────────────
  function makeLeg(side) {
    const pivot = new THREE.Group();
    pivot.position.set(side * 0.12, 0.82, 0);
    const thigh = mk(new THREE.CylinderGeometry(0.11, 0.10, 0.38, 8), outfitMat, 0, -0.19, 0);
    pivot.add(thigh);
    const shinPivot = new THREE.Group();
    shinPivot.position.set(0, -0.38, 0);
    const shin  = mk(new THREE.CylinderGeometry(0.09, 0.08, 0.36, 8), bootMat, 0, -0.18, 0);
    // Knee pad
    const kPad  = mk(new THREE.BoxGeometry(0.17, 0.13, 0.14), padMat, 0, -0.01, 0.09);
    shinPivot.add(shin, kPad);
    pivot.add(shinPivot);
    return { pivot };
  }
  const leftLeg  = makeLeg(-1);
  const rightLeg = makeLeg( 1);
  group.add(leftLeg.pivot, rightLeg.pivot);

  // ── Collect all meshes (for flash / death) ──────────────────────
  const allMeshes = [];
  group.traverse(child => { if (child.isMesh) allMeshes.push(child); });

  group.userData.parts = {
    headPivot,
    leftArmPivot:      leftArm.pivot,
    rightArmPivot:     rightArm.pivot,
    rightForearmPivot: rightArm.forearmPivot,
    leftLegPivot:      leftLeg.pivot,
    rightLegPivot:     rightLeg.pivot,
    allMeshes
  };

  return group;
}

// Attach a detailed gun (matching player weapon) to a bot's right forearm
function buildBotGun(bot) {
  const p = bot.parts;
  if (p.botGunGroup) {
    p.rightForearmPivot.remove(p.botGunGroup);
    const toRemove = new Set();
    p.botGunGroup.traverse(c => { if (c.isMesh) toRemove.add(c); });
    p.allMeshes = p.allMeshes.filter(m => !toRemove.has(m));
  }
  const g = new THREE.Group();
  g.scale.setScalar(0.40);
  g.position.set(0.04, -0.38, 0);
  fillGunGroup(bot.weapon, g);
  p.rightForearmPivot.add(g);
  p.botGunGroup = g;
  g.traverse(c => {
    if (c.isMesh) {
      const cloned = c.material.clone();
      cloned.userData.baseColor = c.material.userData && c.material.userData.baseColor != null
        ? c.material.userData.baseColor : c.material.color.getHex();
      c.material = cloned;
      p.allMeshes.push(c);
    }
  });
}

function spawnBots() {
  // Clear existing bots
  for (const b of bots) scene.remove(b.mesh);
  bots.length = 0;

  let t;
  if (state.endless) {
    const el = state.endlessLevel;
    t = Math.min(1, 0.99 + el * 0.002);
  } else {
    t = (Math.max(1, state.level) - 1) / 99;
  }
  const botAccuracy    = Math.min(0.99, 0.05 + t * 0.94);
  const botSpeed       = Math.min(12,   (0.5  + t * 1.0) * 5);
  const botAggroRadius = Math.min(120,  20 + t * 100);

  const rng = (i) => seededRand(i * 43.7 + 17);

  for (let i = 0; i < NUM_BOTS; i++) {
    const angle = rng(i*4)     * Math.PI * 2;
    const dist  = 30 + rng(i*4+1) * 220;
    const x     = Math.cos(angle) * dist;
    const z     = Math.sin(angle) * dist;
    const y     = getTerrainY(x, z);

    const outfitHue   = ((i * 137.508) % 360) / 360;
    const outfitColor = new THREE.Color().setHSL(outfitHue, 0.65, 0.45);
    const mesh = createBotMesh(outfitColor);
    mesh.position.set(x, y, z);
    scene.add(mesh);

    // Each bot gets a random weapon
    const wKeys = ['pistol','rifle','shotgun','smg'];
    const wKey  = wKeys[Math.floor(rng(i*4+2) * wKeys.length)];

    const bot = {
      mesh, parts: mesh.userData.parts, alive: true,
      hp: 100, maxHp: 100,
      x, y, z,
      yaw: rng(i*4+3) * Math.PI * 2,
      state: 'patrol',
      weapon: wKey,
      fireCooldown: Math.random() * 2,
      hitFlash: 0,
      accuracy: botAccuracy,
      speed: botSpeed,
      aggroRadius: botAggroRadius,
      target: null,
      deathTimer: 0,
      walkPhase: rng(i*4+3) * Math.PI * 2,
      strafeDir: (rng(i*4+3) > 0.5 ? 1 : -1),
      strafeTimer: 0,
      aiTimer: Math.random() * 0.1,  // stagger so all bots don't update same frame
    };
    bots.push(bot);
    buildBotGun(bot);
  }
  state.botsAlive = NUM_BOTS;
}

function initStorm() {
  storm.radius       = MAP_SIZE * 0.48;
  storm.targetRadius = MAP_SIZE * 0.48;
  storm.cx = 0; storm.cz = 0;
  storm.shrinkTimer  = STORM_INTERVAL;
  storm.shrinkCount  = 0;
  storm.damageTimer  = 0;
  stormWall.scale.set(storm.radius, 1, storm.radius);
  stormWall.visible  = true;
}

// ════════════════════════════════════════════════════════════════
//  RENDER LOOP (placeholder — populated after map/bots added)
// ════════════════════════════════════════════════════════════════
let lastTime = 0;
let _hudTimer = 0;
function loop(t) {
  requestAnimationFrame(loop);
  if (lastTime === 0) { lastTime = t; return; }
  const dt = Math.min((t - lastTime) / 1000, 0.05);
  lastTime = t;
  if (state.phase === 'playing') {
    updatePlayer(dt);
    updateBots(dt);
    updateStorm(dt);
    _hudTimer -= dt;
    if (_hudTimer <= 0) { updateHUD(); _hudTimer = 0.067; } // 15fps — canvas redraw is expensive
    updateImpacts(dt);
    updateTracers(dt);
    updateClouds(dt);
    updateDust(dt);
    updateLightning(dt);
    if (buildMode) updateGhost();
    // Hold to build: continuously place while mouse held (0.15s delay then ~10/sec)
    if (mouseLeftDown && buildMode && document.pointerLockElement === canvas) {
      buildHoldTimer -= dt;
      if (buildHoldTimer <= 0) {
        placePiece();
        buildHoldTimer = 0.08;
      }
    }
    // Auto-fire: hold mouse to shoot continuously (fire rate gated by fireCooldown inside shoot())
    if (mouseLeftDown && !buildMode && document.pointerLockElement === canvas) {
      if (editMode && editPiece) {
        // Hold to paint edit panels: continuously select whatever the crosshair is on
        _editPaintRay.setFromCamera(mouseNDC, camera);
        const hits = _editPaintRay.intersectObjects(editPanels, false);
        if (hits.length > 0) {
          const idx = editPanels.indexOf(hits[0].object);
          if (idx !== -1 && !editSelectedPanels.has(idx)) {
            editSelectedPanels.add(idx);
            buildEditPanels(editPiece);
          }
        }
      } else {
        shoot();
      }
    }
    updateWorldWeapons(dt);
  }
  sky.position.copy(camera.position); // keep sky centred on camera
  // Keep shadow frustum centred on player for best shadow density near the player
  sun.shadow.camera.position.addVectors(sun.position, camera.position);
  sun.shadow.camera.updateProjectionMatrix();
  composer.render();
}
requestAnimationFrame(loop);

// ════════════════════════════════════════════════════════════════
//  PLACEHOLDER FUNCTIONS (filled in subsequent tasks)
// ════════════════════════════════════════════════════════════════
function updatePlayer(dt) {
  if (player.hp <= 0) return;

  // Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  // Crouch
  player.crouching = isAction('crouch');
  const speed = player.crouching ? PLAYER_SPEED * 0.5 : PLAYER_SPEED;
  const height = player.crouching ? PLAYER_HEIGHT * 0.6 : PLAYER_HEIGHT;

  // Movement direction — reuse pre-allocated vectors, no heap allocation per frame
  _moveFwd.set(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  _moveRight.set(Math.cos(player.yaw), 0, -Math.sin(player.yaw));
  _moveVec.set(0, 0, 0);
  if (isAction('forward')) _moveVec.addScaledVector(_moveFwd,   1);
  if (isAction('back'))    _moveVec.addScaledVector(_moveFwd,  -1);
  if (isAction('left'))    _moveVec.addScaledVector(_moveRight,-1);
  if (isAction('right'))   _moveVec.addScaledVector(_moveRight, 1);
  if (_moveVec.lengthSq() > 0) _moveVec.normalize().multiplyScalar(speed * dt);
  const move = _moveVec; // alias for readability below

  // Apply horizontal movement with wall collision
  _nextPos.copy(camera.position).add(move);
  const next = _nextPos;
  if (!checkWallCollision(next.x, camera.position.z)) camera.position.x = next.x;
  if (!checkWallCollision(camera.position.x, next.z)) camera.position.z = next.z;

  // Gravity & jump
  if (player.onGround && isAction('jump')) {
    player.velY = JUMP_FORCE;
    player.onGround = false;
  }
  player.velY += GRAVITY * dt;
  camera.position.y += player.velY * dt;

  // Terrain height — also check placed piece surfaces and building roofs
  let groundY = getTerrainY(camera.position.x, camera.position.z) + height;
  const surfTargets = [];
  placedPieces.forEach(p => {
    const dx = p.mesh.position.x - camera.position.x;
    const dz = p.mesh.position.z - camera.position.z;
    if (dx*dx + dz*dz < 36) surfTargets.push(p.mesh);
  });
  buildingSurfaces.forEach(m => {
    const dx = m.position.x - camera.position.x;
    const dz = m.position.z - camera.position.z;
    if (dx*dx + dz*dz < 2500) surfTargets.push(m); // buildings can be large
  });
  if (surfTargets.length > 0) {
    // Start ray 0.5 above camera to catch thin surfaces (roof slabs) even if camera
    // clips slightly into them during fast falls.
    _downOrigin.copy(camera.position);
    _downOrigin.y += 0.5;
    _downRay.set(_downOrigin, _downDir);
    const pieceHits = _downRay.intersectObjects(surfTargets, false);
    if (pieceHits.length > 0) {
      const pieceGroundY = (rayOrigin.y - pieceHits[0].distance) + height;
      if (pieceGroundY > groundY) groundY = pieceGroundY;
    }
  }
  if (camera.position.y <= groundY) {
    camera.position.y = groundY;
    player.velY = 0;
    player.onGround = true;
  }

  // Map boundary clamp
  const halfMap = MAP_SIZE / 2 - 2;
  camera.position.x = Math.max(-halfMap, Math.min(halfMap, camera.position.x));
  camera.position.z = Math.max(-halfMap, Math.min(halfMap, camera.position.z));

  // Fire cooldown
  if (player.fireCooldown > 0) player.fireCooldown -= dt;
}

// Pre-allocated objects to avoid per-call GC pressure
// Pre-allocated for updatePlayer downward ground-collision ray (called every frame)
const _downRay    = new THREE.Raycaster();
const _downOrigin = new THREE.Vector3();
const _downDir    = new THREE.Vector3(0, -1, 0);
// Pre-allocated for edit-paint raycast (can fire every frame while mouse held)
const _editPaintRay = new THREE.Raycaster();
// Pre-allocated for shoot() — avoids new Raycaster + Vector3 per pellet
const _shootRay = new THREE.Raycaster();
const _shootDir = new THREE.Vector3();
const _pieceMeshScratch    = []; // reused each shot for placed-piece mesh list
const _aliveBotMeshScratch = []; // reused each shot for alive-bot mesh list
// Pre-allocated for updatePlayer movement — avoids 4 new Vector3 per frame
const _moveFwd   = new THREE.Vector3();
const _moveRight = new THREE.Vector3();
const _moveVec   = new THREE.Vector3();
const _nextPos   = new THREE.Vector3();
// Pre-allocated for runBotShooting — avoids new Vector3 per bot shot
const _botFromPos = new THREE.Vector3();

function getTerrainY(x, z) {
  return getTerrainHeightMath(x, z);
}

function checkWallCollision(nx, nz) {
  const footY = camera.position.y - (player.crouching ? PLAYER_HEIGHT * 0.6 : PLAYER_HEIGHT);
  for (const obj of envObjects) {
    // Skip if player feet are above the wall top (standing on roof or placed wall)
    if (obj.maxY !== undefined && footY > obj.maxY - 0.1) continue;
    // Skip if panel bottom is above the player's head (e.g. beam above a door gap)
    if (obj.minY !== undefined && camera.position.y < obj.minY) continue;
    if (Math.abs(nx - obj.x) < obj.w + 0.4 && Math.abs(nz - obj.z) < obj.d + 0.4)
      return true;
  }
  return false;
}

function updateBots(dt) {
  let alive = 0;
  for (const bot of bots) {
    if (!bot.alive) {
      if (bot.deathTimer > 0) {
        bot.deathTimer -= dt;
        bot.mesh.position.y -= dt * 0.5;
        bot.parts.allMeshes.forEach(m => {
          m.material.opacity = Math.max(0, bot.deathTimer / 2);
        });
        if (bot.deathTimer <= 0) bot.mesh.visible = false;
      }
      continue;
    }
    alive++;

    const pp  = camera.position;
    const dx  = pp.x - bot.x;
    const dz  = pp.z - bot.z;
    const distSq = dx*dx + dz*dz;
    const distToPlayer = Math.sqrt(distSq);

    if (distSq > BOT_GHOST_R * BOT_GHOST_R) {
      bot.x += (Math.random()-0.5) * 0.5;
      bot.z += (Math.random()-0.5) * 0.5;
      continue;
    }

    // AI decision runs at 10fps to avoid O(n²) LOS cost every frame
    bot.aiTimer -= dt;
    if (bot.aiTimer <= 0) {
      runBotAI(bot, dt, distToPlayer);
      bot.aiTimer = 0.1;
    }
    runBotMovement(bot, dt);
    runBotShooting(bot, dt, distToPlayer);

    // Bots pick up nearby loot
    for (let wi = worldWeapons.length - 1; wi >= 0; wi--) {
      const ww = worldWeapons[wi];
      const wx = ww.x - bot.x, wz = ww.z - bot.z;
      if (Math.sqrt(wx*wx + wz*wz) < 2) {
        bot.weapon = ww.weaponType;
        buildBotGun(bot);
        scene.remove(ww.mesh);
        worldWeapons.splice(wi, 1);
        break;
      }
    }

    if (bot.hitFlash > 0) {
      bot.hitFlash -= dt;
      const flashOn = bot.hitFlash > 0;
      bot.parts.allMeshes.forEach(m => {
        m.material.color.set(flashOn ? 0xff8800 : m.material.userData.baseColor);
      });
    }

    // getTerrainHeightMath is O(1) — update every frame so bots track slopes smoothly
    bot.y = getTerrainHeightMath(bot.x, bot.z);

    bot.mesh.position.set(bot.x, bot.y, bot.z);
    bot.mesh.rotation.y = bot.yaw;

    // Skip limb animation for bots beyond 60 units — not visible at that distance
    if (distSq > 60 * 60) continue;

    // Walk cycle speed
    const isMoving = bot.state === 'chase' || bot.state === 'flee' || bot.state === 'patrol' || bot.state === 'attack';
    bot.walkPhase += dt * (isMoving ? 4.5 : 1.5);

    const p = bot.parts;

    if (bot.state === 'attack') {
      // Stand upright, arms raised to aim, legs strafe-walking
      p.leftArmPivot.rotation.x  = -0.9;
      p.rightArmPivot.rotation.x = -0.9;
      p.leftLegPivot.rotation.x  = -Math.sin(bot.walkPhase) * 0.4;
      p.rightLegPivot.rotation.x =  Math.sin(bot.walkPhase) * 0.4;
    } else {
      const legAmp = bot.state === 'flee' ? 0.65 : (isMoving ? 0.55 : 0.10);
      const armAmp = bot.state === 'flee' ? 0.40 : (isMoving ? 0.35 : 0.06);
      p.leftLegPivot.rotation.x  = -Math.sin(bot.walkPhase) * legAmp;
      p.rightLegPivot.rotation.x =  Math.sin(bot.walkPhase) * legAmp;
      p.leftArmPivot.rotation.x  =  Math.sin(bot.walkPhase) * armAmp;
      p.rightArmPivot.rotation.x = -Math.sin(bot.walkPhase) * armAmp;
    }

    // Head turn toward target (smooth lerp, clamped ±60°)
    const lookAt = getTargetPos(bot);
    const angleToPlayer = Math.atan2(lookAt.x - bot.x, lookAt.z - bot.z);
    const TWO_PI = Math.PI * 2;
    const relAngle = ((angleToPlayer - bot.yaw + Math.PI) % TWO_PI + TWO_PI) % TWO_PI - Math.PI;
    const targetHeadY = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, relAngle));
    p.headPivot.rotation.y += (targetHeadY - p.headPivot.rotation.y) * Math.min(1, dt * 5);
  }
  state.botsAlive = alive;
}

function getTargetPos(bot) {
  if (bot.target === 'player') return camera.position;
  if (bot.target && bot.target.alive) return bot.target;
  return camera.position;
}

function runBotAI(bot, dt, distToPlayer) {
  const pp = camera.position;
  const playerVisible = distToPlayer < bot.aggroRadius && hasLOS(bot, pp);

  // Clear dead bot target
  if (bot.target && bot.target !== 'player' && !bot.target.alive) {
    bot.target = null;
    bot.state = 'patrol';
  }

  if (bot.hp < 25) {
    bot.state = 'flee';
  } else if (playerVisible && distToPlayer < 15) {
    bot.state = 'attack';
    bot.target = 'player';
  } else if (playerVisible) {
    bot.state = 'chase';
    bot.target = 'player';
  } else {
    // No player visible — find nearest enemy bot
    let nearest = null, nearestDist = bot.aggroRadius;
    for (const other of bots) {
      if (other === bot || !other.alive) continue;
      const ex = other.x - bot.x, ez = other.z - bot.z;
      const d = Math.sqrt(ex*ex + ez*ez);
      if (d < nearestDist && hasLOS(bot, other)) {
        nearestDist = d; nearest = other;
      }
    }
    if (nearest && nearestDist < 25) {
      bot.state = 'attack';
      bot.target = nearest;
    } else if (nearest) {
      bot.state = 'chase';
      bot.target = nearest;
    } else if (bot.state === 'attack' || bot.state === 'chase') {
      bot.state = 'patrol';
      bot.target = null;
    } else {
      bot.state = 'patrol';
    }
  }
}

function hasLOS(bot, targetPos) {
  for (const obj of envObjects) {
    const ddx = targetPos.x - bot.x, ddz = targetPos.z - bot.z;
    const dbx = bot.x - obj.x,      dbz = bot.z - obj.z;
    if (Math.abs(dbx) > obj.w * 4 && Math.abs(dbz) > obj.d * 4) continue;
    const lenSq = ddx*ddx + ddz*ddz + 0.001;
    const t = Math.max(0, Math.min(1, (dbx*ddx + dbz*ddz) / lenSq));
    const cx = bot.x + t*ddx - obj.x, cz = bot.z + t*ddz - obj.z;
    if (Math.abs(cx) < obj.w + 0.2 && Math.abs(cz) < obj.d + 0.2) return false;
  }
  return true;
}

function runBotMovement(bot, dt) {
  let tx = bot.x, tz = bot.z;

  if (bot.state === 'patrol') {
    if (Math.random() < dt * 1.2) bot.yaw += (Math.random()-0.5) * 2.2;
    tx = bot.x + Math.sin(bot.yaw) * bot.speed * dt * 0.75;
    tz = bot.z + Math.cos(bot.yaw) * bot.speed * dt * 0.75;
  } else if (bot.state === 'chase') {
    const tp = getTargetPos(bot);
    bot.yaw = Math.atan2(tp.x - bot.x, tp.z - bot.z);
    tx = bot.x + Math.sin(bot.yaw) * bot.speed * dt;
    tz = bot.z + Math.cos(bot.yaw) * bot.speed * dt;
  } else if (bot.state === 'attack') {
    const tp = getTargetPos(bot);
    bot.yaw = Math.atan2(tp.x - bot.x, tp.z - bot.z);
    // Strafe perpendicular to aim — flip direction every 0.8–2s
    bot.strafeTimer -= dt;
    if (bot.strafeTimer <= 0) {
      bot.strafeDir = Math.random() > 0.5 ? 1 : -1;
      bot.strafeTimer = 0.8 + Math.random() * 1.2;
    }
    const sYaw = bot.yaw + (Math.PI / 2) * bot.strafeDir;
    tx = bot.x + Math.sin(sYaw) * bot.speed * dt * 0.65;
    tz = bot.z + Math.cos(sYaw) * bot.speed * dt * 0.65;
  } else if (bot.state === 'flee') {
    const tp = getTargetPos(bot);
    bot.yaw = Math.atan2(bot.x - tp.x, bot.z - tp.z);
    tx = bot.x + Math.sin(bot.yaw) * bot.speed * dt * 1.2;
    tz = bot.z + Math.cos(bot.yaw) * bot.speed * dt * 1.2;
  }

  const h = MAP_SIZE/2 - 2;
  tx = Math.max(-h, Math.min(h, tx));
  tz = Math.max(-h, Math.min(h, tz));
  if (!checkWallCollision(tx, bot.z)) bot.x = tx;
  if (!checkWallCollision(bot.x, tz)) bot.z = tz;
}

function runBotShooting(bot, dt, distToPlayer) {
  if (bot.state !== 'attack') return;
  bot.fireCooldown -= dt;
  if (bot.fireCooldown > 0) return;
  bot.fireCooldown = WEAPONS[bot.weapon].fireRate * (1 / bot.accuracy) * 0.5;
  if (Math.random() > bot.accuracy) return;
  _botFromPos.set(bot.x, bot.y + 1.4, bot.z); // gun height — reuse pre-allocated
  if (bot.target === 'player') {
    damagePlayer(WEAPONS[bot.weapon].damage * 0.6);
    spawnTracer(_botFromPos, camera.position, 0xff4422); // red-orange → player
  } else if (bot.target && bot.target.alive) {
    damageBot(bot.target, WEAPONS[bot.weapon].damage * 2.5, false);
    // Reuse _nextPos as scratch for target position (not used concurrently)
    _nextPos.set(bot.target.x, bot.target.y + 1.4, bot.target.z);
    spawnTracer(_botFromPos, _nextPos, 0xffaa00); // yellow-orange → other bot
  }
}

function damageBot(bot, dmg, byPlayer = true) {
  if (!bot.alive) return;
  bot.hp -= dmg;
  bot.hitFlash = 0.2;
  if (bot.hp <= 0) killBot(bot, byPlayer);
}

const WEAPON_LOOT_COLORS = {
  pistol:  0xaaaaaa,
  rifle:   0x556655,
  shotgun: 0x8B4513,
  sniper:  0x334455,
  smg:     0x888888,
};

function spawnLoot(x, y, z, weaponType) {
  const color = WEAPON_LOOT_COLORS[weaponType] || 0xffffff;
  const group = new THREE.Group();

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.15, 1.0),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.4, roughness: 0.6, metalness: 0.4 })
  );
  group.add(body);

  // Small glow light (range 4 — cheap)
  const light = new THREE.PointLight(color, 1.2, 4);
  light.position.y = 0.4;
  group.add(light);

  group.position.set(x, y + 0.8, z);
  scene.add(group);

  worldWeapons.push({ mesh: group, weaponType, x, y: y + 0.8, z, bobT: Math.random() * Math.PI * 2, lifetime: 60 });
}

function updateWorldWeapons(dt) {
  for (let i = worldWeapons.length - 1; i >= 0; i--) {
    const w = worldWeapons[i];
    w.lifetime -= dt;

    // Bob and rotate
    w.bobT += dt * 2;
    w.mesh.position.y = w.y + Math.sin(w.bobT) * 0.18;
    w.mesh.rotation.y += dt * 1.5;

    // Auto-collect if player walks within 1.5 units
    const dx = camera.position.x - w.x;
    const dz = camera.position.z - w.z;
    if (Math.sqrt(dx * dx + dz * dz) < 1.5) {
      giveWeapon(w.weaponType);
      scene.remove(w.mesh);
      worldWeapons.splice(i, 1);
      continue;
    }

    // Despawn after 60 seconds
    if (w.lifetime <= 0) {
      scene.remove(w.mesh);
      worldWeapons.splice(i, 1);
    }
  }
}

function damagePiece(piece, dmg) {
  piece.hp -= dmg;
  // Darken tint based on remaining HP
  const t = Math.max(0, piece.hp / piece.maxHp);
  const base = MATERIALS_DEF[piece.mat].color;
  const r = ((base >> 16) & 0xff) / 255;
  const g = ((base >>  8) & 0xff) / 255;
  const b = ( base        & 0xff) / 255;
  piece.mesh.traverse(child => {
    if (child.isMesh) child.material.color.setRGB(r * (0.35 + t * 0.65), g * (0.35 + t * 0.65), b * (0.35 + t * 0.65));
  });
  if (piece.hp <= 0) destroyPiece(piece);
}

function destroyPiece(piece) {
  scene.remove(piece.mesh);
  // Remove all envObjects entries belonging to this piece
  piece.envObjs.forEach(obj => {
    const idx = envObjects.indexOf(obj);
    if (idx !== -1) envObjects.splice(idx, 1);
  });
  const idx = placedPieces.indexOf(piece);
  if (idx !== -1) placedPieces.splice(idx, 1);
  // Cascade: pieces that lost their support should also fall
  pruneUnsupported();
}

function killBot(bot, byPlayer = true) {
  bot.alive = false;
  bot.deathTimer = 2;
  spawnLoot(bot.x, bot.y, bot.z, bot.weapon || 'pistol');
  bot.parts.allMeshes.forEach(m => {
    const baseColor = m.material.userData.baseColor;
    m.material = m.material.clone();
    m.material.transparent = true;
    m.material.userData.baseColor = baseColor;
  });
  if (byPlayer) state.kills++;
  checkWinCondition();
}

function damagePlayer(dmg) {
  player.hp -= dmg;
  player.hitTime = 0.3;
  const df = document.getElementById('dmgFlash');
  df.classList.add('hit');
  setTimeout(() => df.classList.remove('hit'), 80);
  if (player.hp <= 0) killPlayer();
}

function respawnPlayer() {
  const angle = Math.random() * Math.PI * 2;
  const dist  = Math.random() * storm.radius * 0.8;
  const rx = storm.cx + Math.cos(angle) * dist;
  const rz = storm.cz + Math.sin(angle) * dist;
  camera.position.set(rx, getTerrainY(rx, rz) + PLAYER_HEIGHT, rz);
  player.hp = 100;
  player.hitTime = 0;
  player.inStorm = false;
  document.getElementById('overlay').style.display = 'none';
  canvas.requestPointerLock();
}

function killPlayer() {
  player.hp = 0;
  if (state.livesMode && state.lives > 0) {
    state.lives--;
    state.phase = 'playing';
    document.exitPointerLock();
    const livesLeft = state.lives;
    const ov = document.getElementById('overlay');
    ov.style.display = 'flex';
    ov.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;gap:1em;">
      <h2 style="color:#ff4444;margin:0">YOU DIED</h2>
      <p style="color:#fff;margin:0">${livesLeft} ${livesLeft === 1 ? 'life' : 'lives'} remaining</p>
      <button class="btn" id="btnRespawn">RESPAWN</button>
    </div>`;
    document.getElementById('btnRespawn').addEventListener('click', respawnPlayer);
    return;
  }
  state.phase = 'dead';
  document.exitPointerLock();
  showOverlay('YOU DIED', `Level ${state.level} — Try again?`, 'RETRY', 'MAIN MENU');
}

function checkWinCondition() {
  // Count directly — state.botsAlive is updated at end of updateBots() so it
  // is stale when called from killBot() mid-loop.
  if (bots.every(b => !b.alive) && state.phase === 'playing') {
    state.phase = 'win';
    document.exitPointerLock();
    if (!state.endless) {
      state.level = Math.min(state.level + 1, 101);
      saveGame();
    }
    showWinScreen();
  }
}

function showWinScreen() {
  const ov = document.getElementById('overlay');
  const nextBtn = state.level > 100 ? 'ENDLESS MODE' : `LEVEL ${state.level}`;
  const subMsg  = state.level > 100 ? 'ENDLESS MODE UNLOCKED!' : `Level ${state.level - 1} complete!`;
  ov.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
      <div style="
        width:110px;height:110px;border-radius:50%;
        background:linear-gradient(145deg,#ffe066,#f0a000);
        border:5px solid #fff8;
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 0 40px #f0c04099,0 0 80px #f0c04044;
        font-size:3.8em;font-weight:900;color:#fff;
        text-shadow:0 2px 8px #0008;
        margin-bottom:0.35em;
        animation:winPulse 1.4s ease-in-out infinite alternate;
      ">#1</div>
      <h1 style="
        font-size:3em;letter-spacing:0.08em;
        background:linear-gradient(90deg,#ffe066,#fff,#ffe066);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        margin:0 0 0.15em;text-shadow:none;
      ">VICTORY ROYALE</h1>
      <p style="color:#ccc;font-size:1.1em;margin:0 0 0.5em;">${subMsg}</p>
      <p style="color:#f0c040;font-size:1em;margin:0 0 1.4em;">
        ${state.kills} elimination${state.kills !== 1 ? 's' : ''}
      </p>
      <div>
        <button class="btn" id="winBtn1">${nextBtn}</button>
        <button class="btn" id="winBtn2" style="background:#555;color:#fff;">MAIN MENU</button>
      </div>
    </div>
    <style>
      @keyframes winPulse {
        from { box-shadow:0 0 30px #f0c04088,0 0 60px #f0c04033; }
        to   { box-shadow:0 0 55px #f0c040cc,0 0 100px #f0c04066; }
      }
    </style>
  `;
  ov.style.display = 'flex';
  document.getElementById('winBtn1').addEventListener('click', () => {
    ov.style.display = 'none';
    if (state.level > 100) startGame(true);
    else startGame(false);
  });
  document.getElementById('winBtn2').addEventListener('click', () => {
    ov.innerHTML = getMainMenuHTML();
    bindMainMenuButtons();
  });
}

function showOverlay(title, msg, btn1, btn2) {
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1>${title}</h1>
    <p>${msg}</p>
    <button class="btn" id="ovBtn1">${btn1}</button>
    <button class="btn" id="ovBtn2">${btn2}</button>
  `;
  ov.style.display = 'flex';
  document.getElementById('ovBtn1').addEventListener('click', () => {
    ov.style.display = 'none';
    if (title === 'VICTORY!' && state.level > 100) startGame(true);
    else startGame(state.endless);
  });
  document.getElementById('ovBtn2').addEventListener('click', () => {
    ov.innerHTML = getMainMenuHTML();
    bindMainMenuButtons();
  });
}

function getMainMenuHTML() {
  let s = {};
  try { s = JSON.parse(localStorage.getItem('brSave') || '{}'); } catch(e) { s = {}; }
  const maxLevel = s.level || 1;
  const unlocked = s.endlessUnlocked || maxLevel > 100;

  let grid = '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:420px;margin-bottom:1.2em;max-height:160px;overflow-y:auto;padding:4px;">';
  for (let i = 1; i <= Math.min(maxLevel + 1, 100); i++) {
    const done    = i < maxLevel;
    const current = i === maxLevel;
    const bg  = done ? '#2a5a2a' : current ? '#f0c040' : '#333';
    const col = done ? '#88ff88' : current ? '#111'    : '#666';
    grid += `<button class="btn" onclick="launchLevel(${i})" style="padding:0.3em 0.6em;font-size:0.8em;background:${bg};color:${col};min-width:38px;">${i}</button>`;
  }
  grid += '</div>';

  return `
    <h1>FORTITE 1</h1>
    <p style="margin-bottom:0.8em">Select a level or continue:</p>
    ${maxLevel > 1 ? grid : ''}
    <button class="btn" id="btnPlay">&#9654; LEVEL ${Math.min(maxLevel, 100)}</button>
    ${unlocked ? '<button class="btn" id="btnEndless" style="background:#6622cc;color:#fff">&#8734; ENDLESS MODE</button>' : ''}
    <button class="btn" id="btnLives" style="background:#cc2222;color:#fff">&#10084; 3 LIVES MODE</button>
    <p style="font-size:0.8em;color:#777;margin-top:0.8em">Progress saved automatically</p>
  `;
}

window.launchLevel = function(lvl) {
  state.level = lvl;
  document.getElementById('overlay').style.display = 'none';
  startGame(false);
};

function startLivesGame() {
  startGame(false);
  state.livesMode = true;
  state.lives = 3;
}

function bindMainMenuButtons() {
  document.getElementById('btnPlay')?.addEventListener('click', () => startGame(false));
  document.getElementById('btnEndless')?.addEventListener('click', () => startGame(true));
  document.getElementById('btnLives')?.addEventListener('click', startLivesGame);
}

function triggerLightning() {
  const angle = Math.random() * Math.PI * 2;
  const r = storm.radius * 0.85;
  lightningLight.position.set(
    storm.cx + Math.cos(angle) * r,
    30 + Math.random() * 30,
    storm.cz + Math.sin(angle) * r
  );
  lightningLight.intensity = 6 + Math.random() * 4;
  lightningTimer = 0.25;
}

function updateLightning(dt) {
  if (lightningTimer > 0) {
    lightningTimer -= dt;
    lightningLight.intensity = Math.max(0, lightningLight.intensity - dt * 30);
    if (lightningTimer <= 0) lightningLight.intensity = 0;
  }
}

function updateStorm(dt) {
  storm.shrinkTimer -= dt;
  if (storm.shrinkTimer <= 0 && storm.shrinkCount < STORM_SHRINKS) {
    storm.shrinkCount++;
    triggerLightning();
    storm.shrinkTimer = STORM_INTERVAL;
    const t = storm.shrinkCount / STORM_SHRINKS;
    storm.targetRadius = MAP_SIZE * 0.48 * (1 - t * 0.85);
    const angle = Math.random() * Math.PI * 2;
    const shift = storm.targetRadius * 0.2;
    storm.cx = Math.cos(angle) * shift;
    storm.cz = Math.sin(angle) * shift;
  }

  storm.radius += (storm.targetRadius - storm.radius) * dt * 0.3;
  stormWall.scale.set(storm.radius, 1, storm.radius);
  stormWall.position.set(storm.cx, 5, storm.cz);

  const pp = camera.position;
  const dpx = pp.x - storm.cx, dpz = pp.z - storm.cz;
  const playerDistToCenter = Math.sqrt(dpx*dpx + dpz*dpz);
  if (playerDistToCenter > storm.radius) {
    storm.damageTimer += dt;
    if (storm.damageTimer >= 1) {
      storm.damageTimer = 0;
      damagePlayer(STORM_DAMAGE);
    }
    player.inStorm = true;
  } else {
    storm.damageTimer = 0;
    player.inStorm = false;
  }

  for (const bot of bots) {
    if (!bot.alive) continue;
    const bdx = bot.x - storm.cx, bdz = bot.z - storm.cz;
    if (Math.sqrt(bdx*bdx + bdz*bdz) > storm.radius * 1.05) {
      bot.x += (storm.cx - bot.x) * dt * 0.2;
      bot.z += (storm.cz - bot.z) * dt * 0.2;
    }
  }
}
function updateHUD() {
  const W = hud.width, H = hud.height;
  hctx.clearRect(0, 0, W, H);

  if (state.phase !== 'playing') return;

  // ── Storm warning border flash ──
  if (player.inStorm) {
    hctx.save();
    hctx.globalAlpha = 0.25 + 0.15 * Math.sin(Date.now() / 200);
    hctx.strokeStyle = '#4400ff';
    hctx.lineWidth = 20;
    hctx.strokeRect(0, 0, W, H);
    hctx.restore();
  }

  // ── Hit flash ──
  if (player.hitTime > 0) {
    player.hitTime -= 0.016;
    hctx.save();
    hctx.globalAlpha = (player.hitTime / 0.3) * 0.35;
    hctx.fillStyle = '#ff0000';
    hctx.fillRect(0, 0, W, H);
    hctx.restore();
  }

  // ── Health bar (bottom left) ──
  const hpRatio = Math.max(0, player.hp / player.maxHp);
  hctx.fillStyle = 'rgba(0,0,0,0.55)';
  hctx.beginPath();
  hctx.roundRect(24, H - 58, 204, 32, 6);
  hctx.fill();
  const hpColor = hpRatio > 0.5 ? '#44ff44' : hpRatio > 0.25 ? '#ffaa00' : '#ff3333';
  hctx.fillStyle = hpColor;
  hctx.beginPath();
  hctx.roundRect(28, H - 54, 196 * hpRatio, 24, 4);
  hctx.fill();
  hctx.fillStyle = '#fff';
  hctx.font = 'bold 13px Segoe UI';
  hctx.textAlign = 'center';
  hctx.fillText(`HP: ${Math.ceil(player.hp)}`, 126, H - 36);

  // ── Lives counter (above HP bar, lives mode only) ──
  if (state.livesMode) {
    hctx.save();
    hctx.font = 'bold 16px Segoe UI';
    hctx.textAlign = 'left';
    let hearts = '';
    for (let i = 0; i < 3; i++) hearts += i < state.lives ? '❤' : '🖤';
    hctx.fillStyle = '#ff4444';
    hctx.fillText(hearts, 24, H - 68);
    hctx.restore();
  }

  // ── Ammo counter (bottom right) ──
  const inv = player.inventory[player.weapon];
  const ammoText = inv ? `${inv.ammo} / ${WEAPONS[player.weapon].maxAmmo}` : '—';
  hctx.fillStyle = 'rgba(0,0,0,0.55)';
  hctx.beginPath();
  hctx.roundRect(W - 154, H - 58, 130, 32, 6);
  hctx.fill();
  hctx.fillStyle = '#fff';
  hctx.font = 'bold 18px Segoe UI';
  hctx.textAlign = 'center';
  hctx.fillText(ammoText, W - 89, H - 36);

  // ── Weapon name (above ammo) ──
  hctx.fillStyle = '#f0c040';
  hctx.font = 'bold 13px Segoe UI';
  hctx.fillText(WEAPONS[player.weapon].name, W - 89, H - 64);

  // ── Kills counter (top left) ──
  hctx.fillStyle = 'rgba(0,0,0,0.5)';
  hctx.beginPath();
  hctx.roundRect(16, 16, 130, 38, 6);
  hctx.fill();
  hctx.fillStyle = '#fff';
  hctx.font = 'bold 14px Segoe UI';
  hctx.textAlign = 'left';
  hctx.fillText(`Kills: ${state.kills}`, 28, 40);

  // ── Build mode indicator (below kills) ──
  if (buildMode) {
    hctx.fillStyle = 'rgba(0,0,0,0.5)';
    hctx.beginPath();
    hctx.roundRect(16, 60, 130, 32, 6);
    hctx.fill();
    hctx.fillStyle = '#f0c040';
    hctx.font = 'bold 15px Segoe UI';
    hctx.textAlign = 'left';
    hctx.fillText('BUILD', 28, 81);
    // Show current piece type and material
    hctx.fillStyle = '#ccc';
    hctx.font = '11px Segoe UI';
    hctx.fillText(`${buildType} · ${buildMat}`, 28, 94);
  }

  // ── Level / Bots alive (top center) ──
  const levelLabel = state.endless ? `Endless ${state.endlessLevel}` : `Level ${state.level}`;
  hctx.fillStyle = 'rgba(0,0,0,0.5)';
  hctx.beginPath();
  hctx.roundRect(W/2 - 100, 10, 200, 44, 6);
  hctx.fill();
  hctx.fillStyle = '#f0c040';
  hctx.font = 'bold 15px Segoe UI';
  hctx.textAlign = 'center';
  hctx.fillText(levelLabel, W/2, 30);
  hctx.fillStyle = '#aaa';
  hctx.font = '12px Segoe UI';
  hctx.fillText(`${state.botsAlive} players remaining`, W/2, 47);

  // ── Minimap (top right) ──
  drawMinimap(W - 134, 10, 124, 124);

  // ── Storm timer ──
  const stormIn = Math.ceil(storm.shrinkTimer);
  if (stormIn < 30) {
    hctx.fillStyle = stormIn < 10 ? '#ff4444' : '#ffaa00';
    hctx.font = 'bold 13px Segoe UI';
    hctx.textAlign = 'center';
    hctx.fillText(`Storm closes in ${stormIn}s`, W/2, 70);
  }
}

function drawMinimap(mx, my, mw, mh) {
  const scale = mw / MAP_SIZE;

  hctx.fillStyle = 'rgba(0,0,0,0.6)';
  hctx.beginPath();
  hctx.roundRect(mx, my, mw, mh, 8);
  hctx.fill();

  // Storm circle
  const stormScreenR = storm.radius * scale;
  const scx = mx + mw/2 + storm.cx * scale;
  const scz = my + mh/2 + storm.cz * scale;
  hctx.strokeStyle = 'rgba(100,0,255,0.8)';
  hctx.lineWidth = 2;
  hctx.beginPath();
  hctx.arc(scx, scz, stormScreenR, 0, Math.PI*2);
  hctx.stroke();

  // Chest markers (yellow squares)
  hctx.fillStyle = '#f0c040';
  for (const chest of chests) {
    if (chest.open) continue;
    const cx = mx + mw/2 + chest.x * scale;
    const cz = my + mh/2 + chest.z * scale;
    hctx.fillRect(cx - 2, cz - 2, 4, 4);
  }

  // Bot dots (red)
  hctx.fillStyle = '#ff4444';
  for (const bot of bots) {
    if (!bot.alive) continue;
    const bx = mx + mw/2 + bot.x * scale;
    const bz = my + mh/2 + bot.z * scale;
    hctx.beginPath();
    hctx.arc(bx, bz, 2, 0, Math.PI*2);
    hctx.fill();
  }

  // Player dot (white) + direction arrow
  const px = mx + mw/2 + camera.position.x * scale;
  const pz = my + mh/2 + camera.position.z * scale;
  hctx.fillStyle = '#fff';
  hctx.beginPath();
  hctx.arc(px, pz, 3.5, 0, Math.PI*2);
  hctx.fill();
  hctx.strokeStyle = '#fff';
  hctx.lineWidth = 1.5;
  hctx.beginPath();
  hctx.moveTo(px, pz);
  hctx.lineTo(px - Math.sin(player.yaw)*10, pz - Math.cos(player.yaw)*10);
  hctx.stroke();

  // Border
  hctx.strokeStyle = 'rgba(255,255,255,0.3)';
  hctx.lineWidth = 1;
  hctx.beginPath();
  hctx.roundRect(mx, my, mw, mh, 8);
  hctx.stroke();
}
</script>
